<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Snippets</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f59e0b'/><text x='16' y='23' text-anchor='middle' font-family='monospace' font-size='16' font-weight='bold' fill='%230a0e17'>{S}</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0e17; color: #e2e8f0; font-family: 'Inter', sans-serif; text-align: center; padding: 2rem;
    }
    .logo { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 500; color: #f59e0b; margin-bottom: 2rem; }
    .code { font-family: 'Playfair Display', serif; font-size: clamp(6rem, 15vw, 10rem); font-weight: 700; color: #f59e0b; line-height: 1; }
    .subtitle { font-family: 'Playfair Display', serif; font-size: clamp(1.25rem, 3vw, 1.75rem); margin: 0.5rem 0 1rem; color: #fff; }
    .message { color: #94a3b8; max-width: 28rem; line-height: 1.6; margin-bottom: 2.5rem; }
    .btn {
      display: inline-block; padding: 0.75rem 2rem; background: #f59e0b; color: #0a0e17; font-family: 'Inter', sans-serif;
      font-weight: 600; font-size: 0.95rem; text-decoration: none; border-radius: 8px; transition: background 0.2s;
    }
    .btn:hover { background: #d97706; }
    .footer { margin-top: auto; padding-top: 3rem; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="logo">{S}</div>
  <div class="code">404</div>
  <p class="subtitle">Page not found</p>
  <p class="message">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn">Back to Home</a>
  <div class="footer">Snippets</div>
</body>
</html>
